AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB tables for Codebreaker

Parameters:
  JudgeName:
    Type: String

Resources:
  AnnouncementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-announcements
      AttributeDefinitions:
        - AttributeName: announcementId
          AttributeType: S
      KeySchema:
        - AttributeName: announcementId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ClarificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-clarifications
      AttributeDefinitions:
        - AttributeName: askedBy
          AttributeType: S
        - AttributeName: clarificationTime
          AttributeType: S
      KeySchema:
        - AttributeName: askedBy
          KeyType: HASH
        - AttributeName: clarificationTime
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  ContestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-contests
      AttributeDefinitions:
        - AttributeName: contestId
          AttributeType: S
      KeySchema:
        - AttributeName: contestId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  GlobalCountersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-global-counters
      AttributeDefinitions:
        - AttributeName: counterId
          AttributeType: S
      KeySchema:
        - AttributeName: counterId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ProblemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-problems
      AttributeDefinitions:
        - AttributeName: problemName
          AttributeType: S
      KeySchema:
        - AttributeName: problemName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  SubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-submissions
      AttributeDefinitions:
        - AttributeName: subId
          AttributeType: N
        - AttributeName: contestId
          AttributeType: S
        - AttributeName: problemName
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: subId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: problemIndex
          KeySchema:
            - AttributeName: problemName
              KeyType: HASH
            - AttributeName: subId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: usernameIndex
          KeySchema:
            - AttributeName: username
              KeyType: HASH
            - AttributeName: subId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: contestIndex
          KeySchema:
            - AttributeName: contestId
              KeyType: HASH
            - AttributeName: subId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Table to ensure no race conditions in submission delay bypass
  SubmissionLocksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-submission-locks
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: problemName
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
        - AttributeName: problemName
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: nextAllowedTime
        Enabled: true

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-users
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: contestId
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: contestIndex
          KeySchema:
            - AttributeName: contestId
              KeyType: HASH
            - AttributeName: username
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY

  WebSocketTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${JudgeName}-websocket
      AttributeDefinitions:
        - AttributeName: contestId
          AttributeType: S
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: accountRole
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        # For notifying admins of new clarifications
        - IndexName: accountRoleUsernameIndex
          KeySchema:
            - AttributeName: accountRole
              KeyType: HASH
            - AttributeName: username
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Notifying users of end contest
        - IndexName: contestIdUsernameIndex
          KeySchema:
            - AttributeName: contestId
              KeyType: HASH
            - AttributeName: username
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiryTime
        Enabled: true
